<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- ===== แก้ตรงนี้: ชื่อแท็บ + คำอธิบายสำหรับแชร์ ===== -->
<title>Futai Furniture · รวมลิ้งค์</title>
<meta name="description" content="Futai Furniture — เฟอร์นิเจอร์คุณภาพ รวมทุกช่องทางไว้ที่เดียว" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
  /* =========================================================
     ปรับธีมได้จากตรงนี้จุดเดียว — เปลี่ยนสี/พื้นหลังได้เลย
     ========================================================= */
  :root {
    --bg-1: #1b1320;        /* สีพื้นหลังหลัก (เข้ม) */
    --bg-2: #2a1730;        /* สีพื้นหลังไล่เฉด */
    --glow: #ff6b6b;        /* แสงเรืองด้านบน */
    --accent-1: #ff6b6b;    /* สีเน้น 1 (คอรัล) */
    --accent-2: #ffb454;    /* สีเน้น 2 (ส้มทอง) */
    --text: #f7f1f4;        /* สีตัวอักษรหลัก */
    --text-dim: #b9a7b6;    /* สีตัวอักษรรอง */
    --card: rgba(255,255,255,0.06);
    --card-hover: rgba(255,255,255,0.11);
    --border: rgba(255,255,255,0.12);
    --radius: 18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100dvh;
    font-family: "Noto Sans Thai", "Outfit", system-ui, sans-serif;
    color: var(--text);
    background-color: var(--bg-1);
    display: flex;
    justify-content: center;
    padding: 56px 20px 40px;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- Background slideshow ---------- */
  .bg-layer {
    position: fixed;
    inset: -12%;
    z-index: -2;
    background-size: cover;
    background-position: center;
    filter: blur(14px);
    opacity: 0;
    transition: opacity 1.6s ease;
  }
  .bg-layer.active { opacity: 1; }

  .bg-overlay {
    position: fixed;
    inset: 0;
    z-index: -1;
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(255,107,107,0.22), transparent 60%),
      linear-gradient(160deg, rgba(27,19,32,0.78), rgba(42,23,48,0.82));
  }

  .page {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ---------- โปรไฟล์ ---------- */
  .avatar {
    width: 104px;
    height: 104px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid transparent;
    background:
      linear-gradient(var(--bg-1), var(--bg-1)) padding-box,
      linear-gradient(135deg, var(--accent-1), var(--accent-2)) border-box;
    box-shadow: 0 12px 30px rgba(0,0,0,0.35);
  }

  .name {
    font-family: "Outfit", "Noto Sans Thai", sans-serif;
    font-weight: 700;
    font-size: 1.5rem;
    margin-top: 18px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .verified { width: 18px; height: 18px; color: var(--accent-1); }

  .handle { color: var(--text-dim); font-size: 0.95rem; margin-top: 2px; }

  .bio {
    color: var(--text-dim);
    text-align: center;
    font-size: 0.98rem;
    line-height: 1.55;
    margin-top: 12px;
    max-width: 340px;
  }

  /* ---------- ปุ่มลิ้งค์ ---------- */
  .links {
    width: 100%;
    margin-top: 30px;
    display: flex;
    flex-direction: column;
    gap: 13px;
  }

  .link {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 15px 18px;
    border-radius: var(--radius);
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    text-decoration: none;
    font-weight: 600;
    font-size: 1rem;
    backdrop-filter: blur(8px);
    transition: transform .18s ease, background .18s ease, border-color .18s ease;
  }
  .link:hover, .link:focus-visible {
    background: var(--card-hover);
    border-color: rgba(255,255,255,0.22);
    transform: translateY(-2px);
    outline: none;
  }
  .link:focus-visible { box-shadow: 0 0 0 3px rgba(255,180,84,0.5); }

  .link .icon { width: 24px; height: 24px; flex: none; }
  .link .label { flex: 1; }
  .link .arrow { color: var(--text-dim); width: 18px; height: 18px; flex: none; }

  /* ---------- โซเชียลไอคอนแถวล่าง ---------- */
  .socials {
    display: flex;
    gap: 18px;
    margin-top: 30px;
  }
  .socials a {
    color: var(--text-dim);
    transition: color .15s ease, transform .15s ease;
  }
  .socials a:hover, .socials a:focus-visible {
    color: var(--text);
    transform: translateY(-2px);
    outline: none;
  }
  .socials svg { width: 26px; height: 26px; }

  .footer {
    margin-top: 34px;
    color: var(--text-dim);
    font-size: 0.8rem;
    opacity: 0.7;
  }

  /* ---------- Language switcher ---------- */
  .lang-switcher {
    display: flex;
    gap: 6px;
    margin-top: 16px;
  }
  .lang-btn {
    padding: 5px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text-dim);
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    backdrop-filter: blur(8px);
    transition: background .15s, color .15s, border-color .15s;
    font-family: inherit;
  }
  .lang-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }
  .lang-btn.active {
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    color: #fff;
    border-color: transparent;
  }

  /* ---------- อนิเมชันตอนโหลด ---------- */
  .fade { opacity: 0; transform: translateY(14px); animation: rise .6s ease forwards; }
  .fade:nth-child(1){animation-delay:.05s}
  .links .link:nth-child(1){animation-delay:.15s}
  .links .link:nth-child(2){animation-delay:.22s}
  .links .link:nth-child(3){animation-delay:.29s}
  .links .link:nth-child(4){animation-delay:.36s}
  .links .link:nth-child(5){animation-delay:.43s}
  @keyframes rise { to { opacity: 1; transform: none; } }

  @media (prefers-reduced-motion: reduce) {
    .fade, .links .link { animation: none; opacity: 1; transform: none; }
    .link, .socials a { transition: none; }
  }
</style>
</head>
<body>
  <div class="bg-layer" id="bg0"></div>
  <div class="bg-layer" id="bg1"></div>
  <div class="bg-overlay"></div>
  <main class="page">

    <!-- ===== แก้ตรงนี้: รูปโปรไฟล์ =====
         วางไฟล์รูปไว้โฟลเดอร์เดียวกัน เช่น avatar.jpg แล้วเปลี่ยน src
         หรือใช้ลิ้งค์รูปจากอินเทอร์เน็ตก็ได้ -->
    <img class="avatar fade" src="pro1.jpg" alt="รูปโปรไฟล์ Futai Furniture" />

    <!-- ===== แก้ตรงนี้: ชื่อ + แฮนเดิล + คำแนะนำตัว ===== -->
    <h1 class="name fade">

    <div class="lang-switcher fade">

      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="zh">中文</button>

      <a class="link" href="https://www.tiktok.com/@fthai2025" target="_blank" rel="noopener">
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 3c.4 2.3 1.7 3.8 4 4v2.8c-1.4 0-2.7-.4-4-1.1v6.9c0 3.6-2.9 6.5-6.5 6.5S3.5 19.2 3.5 15.6 6.4 9.1 10 9.1c.4 0 .8 0 1.2.1v3c-.4-.1-.8-.2-1.2-.2-1.9 0-3.5 1.6-3.5 3.6s1.6 3.6 3.5 3.6 3.5-1.6 3.5-3.6V3h3.5z"/></svg>

        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
      </a>

      <a class="link" href="https://www.tiktok.com/@futai.furniture02" target="_blank" rel="noopener">
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 3c.4 2.3 1.7 3.8 4 4v2.8c-1.4 0-2.7-.4-4-1.1v6.9c0 3.6-2.9 6.5-6.5 6.5S3.5 19.2 3.5 15.6 6.4 9.1 10 9.1c.4 0 .8 0 1.2.1v3c-.4-.1-.8-.2-1.2-.2-1.9 0-3.5 1.6-3.5 3.6s1.6 3.6 3.5 3.6 3.5-1.6 3.5-3.6V3h3.5z"/></svg>
        <span class="label">TikTok — @futai.furniture02</span>
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>

      <a class="link" href="https://www.tiktok.com/@line0960108218" target="_blank" rel="noopener">

        <span class="label" data-i18n="link4">บริษัท ฟูไท่ (Futai Furniture)</span>

    </nav>

    <p class="footer fade" data-i18n="footer">© 2026 Futai Furniture</p>

  </main>
<script>
  /* ---------- i18n ---------- */
  const _t = {
    th: {
      bio:    'เฟอร์นิเจอร์คุณภาพดี ราคาคุ้มค่า ✨ ช้อปได้เลยที่ Shopee หรือ ติดตามเราใน TikTok!',
      link4:  'บริษัท ฟูไท่ (Futai Furniture)',
      shopee: 'ร้านค้า Shopee',
      footer: '© 2026 Futai Furniture'
    },
    en: {
      bio:    'Quality furniture at great prices ✨ Shop on Shopee or follow us on TikTok!',
      link4:  'Futai Furniture Co.',
      shopee: 'Shopee Store',
      footer: '© 2026 Futai Furniture'
    },
    zh: {
      bio:    '优质家具，物超所值 ✨ 立即在 Shopee 购买，或关注我们的 TikTok！',
      link4:  '富泰家具 (Futai Furniture)',
      shopee: 'Shopee 店铺',
      footer: '© 2026 富泰家具'
    }
  };

  function setLang(lang) {
    document.querySelectorAll('[data-i18n]').forEach(el => {
      el.textContent = _t[lang][el.dataset.i18n];
    });
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === lang);
    });
  }

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => setLang(btn.dataset.lang));
  });
</script>

<script>
  const _imgs = [
    'im/1.png',
    'im/1%20(2).png',
    'im/11.png',
    'im/33.png',
    'im/333%20(2).png',
    'im/2026-06-09_12-33-13_Lumina_1.png'
  ];
  const _layers = [document.getElementById('bg0'), document.getElementById('bg1')];
  let _cur = 0, _active = 0;
  _layers[0].style.backgroundImage = "url('" + _imgs[0] + "')";
  _layers[0].classList.add('active');
  setInterval(() => {
    _cur = (_cur + 1) % _imgs.length;
    const next = 1 - _active;
    _layers[next].style.backgroundImage = "url('" + _imgs[_cur] + "')";
    _layers[next].classList.add('active');
    _layers[_active].classList.remove('active');
    _active = next;
  }, 4500);
</script>
</body>
</html>
